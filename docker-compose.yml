version: '3.9'
services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: bash -lc "pip install -e .[dev] && uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      - WISP_DB_URL=postgresql+asyncpg://wisp:wisp@db:5432/wisp
      - WISP_REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wisp
      POSTGRES_PASSWORD: wisp
      POSTGRES_DB: wisp
    volumes:
      - wisp_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wisp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  wisp_pgdata:
